<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PBI Label Generator</title>
<style>
/* ════════════ RESET ════════════ */
* { box-sizing: border-box; margin: 0; padding: 0; }

/* ════════════ SCREEN UI ════════════ */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: #eef1f7;
  min-height: 100vh;
}
.screen-wrap {
  display: flex; flex-direction: column;
  align-items: center; padding: 32px 16px 60px;
}
.app-header { text-align: center; margin-bottom: 22px; }
.app-header h1 { font-size: 1.4rem; font-weight: 700; color: #0d1b4b; letter-spacing:.04em; }
.app-header p  { font-size: .82rem; color: #666; margin-top: 4px; }

.card {
  background: #fff; border-radius: 10px;
  padding: 26px 28px; width: 100%; max-width: 500px;
  box-shadow: 0 2px 14px rgba(0,0,0,.09);
}
.form-row { display: flex; gap: 14px; }
.form-group { margin-bottom: 14px; flex: 1; }
.form-group label {
  display: block; font-size: .72rem; font-weight: 700;
  text-transform: uppercase; letter-spacing: .07em; color: #555; margin-bottom: 5px;
}
.form-group input {
  width: 100%; padding: 9px 12px;
  border: 1.5px solid #d0d5dd; border-radius: 6px;
  font-size: .9rem; outline: none; background: #fafafa;
  transition: border-color .2s;
}
.form-group input:focus { border-color: #2563eb; background: #fff; }

.btn-row { display: flex; gap: 10px; margin-top: 6px; }
.btn {
  flex: 1; padding: 11px; border: none; border-radius: 7px;
  font-size: .88rem; font-weight: 600; cursor: pointer; transition: background .2s;
}
.btn-generate { background: #0d1b4b; color: #fff; }
.btn-generate:hover { background: #1a3080; }
.btn-print    { background: #16a34a; color: #fff; }
.btn-print:hover { background: #15803d; }
.btn-save     { background: #7c3aed; color: #fff; }
.btn-save:hover  { background: #6d28d9; }
.btn:disabled { background: #9ca3af !important; cursor: not-allowed; }

#status-msg {
  margin-top: 12px; font-size: .82rem; text-align: center; min-height: 18px; color: #555;
}
#status-msg.ok  { color: #16a34a; font-weight: 600; }
#status-msg.err { color: #dc2626; font-weight: 600; }
.summary { margin-top: 10px; font-size: .8rem; color: #888; text-align: center; display: none; }
.summary strong { color: #0d1b4b; }

/* ════════════ SCREEN PREVIEW ════════════
   Shows a scaled-down version of the A4 landscape page.
   Real A4 landscape = 297mm × 210mm.
   We display it at 880px wide → scale = 880/1122px ≈ 0.784
   (1mm ≈ 3.7795px at 96dpi → 297mm ≈ 1122px)
*/
.preview-area  { margin-top: 28px; width: 100%; max-width: 920px; }
.pg-wrap       { margin-bottom: 28px; }
.pg-label {
  font-size: .72rem; font-weight: 700; letter-spacing: .06em;
  text-transform: uppercase; color: #888; text-align: center; margin-bottom: 8px;
}

/* White sheet shadow — mimics paper */
.a4-screen-wrap {
  background: #fff;
  box-shadow: 0 2px 16px rgba(0,0,0,.15);
  border: 1px solid #ccc;
  /* Landscape aspect ratio: 297:210 */
  aspect-ratio: 297 / 210;
  width: 100%;
  position: relative;
  overflow: hidden;
}

/* The inner table grid sits inside with a margin matching the print margin */
.a4-screen {
  position: absolute;
  /* left/right: 18mm/297mm = 6.06% | top/bottom: 12mm/210mm = 5.71% */
  top:    5.71%;
  left:   6.06%;
  right:  6.06%;
  bottom: 5.71%;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  grid-template-rows:    repeat(4, 1fr);
  border: 1.5px solid #000;
  overflow: hidden;
}

.sc-cell {
  border-right:  1px solid #aaa;
  border-bottom: 1px solid #aaa;
  display: flex; flex-direction: column; overflow: hidden;
}
.sc-cell:nth-child(3n)        { border-right: none; }
.sc-cell:nth-last-child(-n+3) { border-bottom: none; }
.sc-cell.empty { background: #f9f9f9; }

.sc-row {
  display: flex; flex: 1;
  border-bottom: 1px solid #dde; overflow: hidden;
}
.sc-row:last-child { border-bottom: none; }

/* Font size scales with container via vw-like approach:
   container is max 920px wide → 1% ≈ 9.2px
   we want ~8pt visible text → use clamp */
.sc-key {
  font-size: clamp(7px, 1.1vw, 11px);
  font-weight: 700; font-family: Arial, sans-serif;
  padding: 2px 4px; border-right: 1px solid #dde;
  width: 32%; display: flex; align-items: center;
  white-space: nowrap; overflow: hidden; color: #111;
}
.sc-val {
  font-size: clamp(7px, 1.1vw, 11px);
  font-weight: 700; font-family: Arial, sans-serif;
  padding: 2px 4px; flex: 1;
  display: flex; align-items: center; justify-content: center;
  text-align: center; color: #111; overflow: hidden;
}


/* ════════════════════════════════════════
   PRINT — A4 LANDSCAPE
   ─────────────────────────────────────
   @page margin: 10mm each side
   Usable area: (297-20)mm × (210-20)mm = 277mm × 190mm
   3 cols: 277/3 = 92.33mm each
   4 rows: 190/4 = 47.5mm each

   Cell inner padding:
     horizontal: 7mm  (0.7cm)
     vertical:   4.5mm (0.45cm)

   Font size: 9pt  (clearly readable at A4)
════════════════════════════════════════ */
#print-area { display: none; }

@page {
  size: A4 landscape;
  margin: 12mm 18mm;   /* top/bottom: 12mm | left/right: 18mm */
}

@media print {
  body         { background: #fff; }
  .screen-wrap { display: none !important; }
  #print-area  { display: block !important; }

  /* Usable: (297 - 2×18) × (210 - 2×12) = 261mm × 186mm */
  .a4-page {
    width:  261mm;   /* 297 - 2×18mm */
    height: 186mm;   /* 210 - 2×12mm */
    display: grid;
    grid-template-columns: repeat(3, 87mm);    /* 261/3 */
    grid-template-rows:    repeat(4, 46.5mm);  /* 186/4 */
    border: 1pt solid #000;
    page-break-after: always;
    overflow: hidden;
  }
  .a4-page:last-child { page-break-after: avoid; }

  /* Individual label cell */
  .p-cell {
    border-right:  0.5pt solid #000;
    border-bottom: 0.5pt solid #000;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .p-cell:nth-child(3n)        { border-right: none; }
  .p-cell:nth-last-child(-n+3) { border-bottom: none; }

  /* Each of 5 rows inside a cell */
  .p-row {
    display: flex; flex: 1;
    border-bottom: 0.5pt solid #000;
    overflow: hidden;
  }
  .p-row:last-child { border-bottom: none; }

  /* KEY — fixed 24mm fits "CUSTOMER:" at 8pt with padding */
  .p-key {
    width: 24mm;
    min-width: 24mm;
    padding: 0 2mm;
    font-size: 8pt;
    font-family: Arial, sans-serif;
    font-weight: 700;
    border-right: 0.5pt solid #000;
    display: flex; align-items: center;
    white-space: nowrap;
    overflow: visible;
  }

  /* VALUE — gets remaining 92.33 - 24 = 68mm
     "YUPO VINYL B/B (G) PG-75 CAR BAT." at 10pt Arial ≈ 67mm → fits */
  .p-val {
    flex: 1;
    padding: 0 2mm;
    font-size: 10pt;
    font-family: Arial, sans-serif;
    font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
  }
  /* MATERIAL row value — smaller to prevent clipping */
  .p-val--small {
    font-size: 9.5pt;
    white-space: nowrap;
    overflow: hidden;
  }
</style>
</head>
<body>

<!-- ══ SCREEN UI ══ -->
<div class="screen-wrap">
  <div class="app-header">
    <h1>📋 PBI Label Generator</h1>
    <p>A4 Landscape · 3 × 4 grid · 12 labels per page</p>
  </div>

  <div class="card">
    <div class="form-group">
      <label>Customer Name</label>
      <input type="text" id="customer" value="PHIL BATTERIES">
    </div>
    <div class="form-group">
      <label>Material</label>
      <input type="text" id="material" value="YUPO VINYL B/B (G) PG-75 CAR BAT.">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Size</label>
        <input type="text" id="size" value="320mm x 1000m">
      </div>
      <div class="form-group">
        <label>Total Quantity</label>
        <input type="number" id="qty" value="60" min="1" max="9999">
      </div>
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="text" id="ldate" value="JUNE 26, 2026">
    </div>

    <div class="btn-row">
      <button class="btn btn-generate" onclick="generate()">⚙️ Generate</button>
      <button class="btn btn-print" id="btn-print" onclick="window.print()" disabled>🖨️ Print</button>
      <button class="btn btn-save"  id="btn-save"  onclick="saveToSheet()" disabled>💾 Save</button>
    </div>

    <div id="status-msg"></div>
    <div class="summary" id="summary">
      <strong id="sum-count"></strong>
    </div>
  </div>

  <div class="preview-area" id="preview-area"></div>
</div>

<!-- ══ PRINT AREA ══ -->
<div id="print-area"></div>

<script>
// ── CONFIG — paste your GAS Web App URL here ──────────────
const GAS_URL = 'https://script.google.com/macros/s/YOUR_DEPLOYMENT_ID/exec';
// ─────────────────────────────────────────────────────────

const PER_PAGE = 12;
let currentData = null;

function buildRows(customer, material, size, n, total, date, forPrint) {
  const fields = [
    ['CUSTOMER:', customer],
    ['MATERIAL:', material],
    ['SIZE:',     size],
    ['QTY:',      `${n} of ${total}`],
    ['DATE:',     date],
  ];
  if (forPrint) {
    return fields.map(([k, v]) => {
      const smallClass = k === 'MATERIAL:' ? ' p-val--small' : '';
      return `<div class="p-row"><div class="p-key">${k}</div><div class="p-val${smallClass}">${v}</div></div>`;
    }).join('');
  } else {
    return fields.map(([k, v]) =>
      `<div class="sc-row"><div class="sc-key">${k}</div><div class="sc-val">${v}</div></div>`
    ).join('');
  }
}

function generate() {
  const customer = document.getElementById('customer').value.trim() || 'CUSTOMER';
  const material = document.getElementById('material').value.trim() || 'MATERIAL';
  const size     = document.getElementById('size').value.trim()     || 'SIZE';
  const qty      = Math.max(1, parseInt(document.getElementById('qty').value) || 1);
  const date     = document.getElementById('ldate').value.trim().toUpperCase() || 'DATE';
  const pages    = Math.ceil(qty / PER_PAGE);

  currentData = { customer, material, size, qty, date, timestamp: new Date().toISOString() };

  /* ── Print HTML ── */
  let ph = '';
  for (let p = 0; p < pages; p++) {
    ph += `<div class="a4-page">`;
    for (let i = 0; i < PER_PAGE; i++) {
      const n = p * PER_PAGE + i + 1;
      ph += n > qty
        ? `<div class="p-cell empty"></div>`
        : `<div class="p-cell">${buildRows(customer, material, size, n, qty, date, true)}</div>`;
    }
    ph += `</div>`;
  }
  document.getElementById('print-area').innerHTML = ph;

  /* ── Screen Preview HTML ── */
  let sh = '';
  for (let p = 0; p < pages; p++) {
    sh += `<div class="pg-wrap">
      <div class="pg-label">Page ${p + 1} of ${pages}</div>
      <div class="a4-screen-wrap">
        <div class="a4-screen">`;
    for (let i = 0; i < PER_PAGE; i++) {
      const n = p * PER_PAGE + i + 1;
      sh += n > qty
        ? `<div class="sc-cell empty"></div>`
        : `<div class="sc-cell">${buildRows(customer, material, size, n, qty, date, false)}</div>`;
    }
    sh += `</div></div></div>`;
  }
  document.getElementById('preview-area').innerHTML = sh;

  document.getElementById('summary').style.display = 'block';
  document.getElementById('sum-count').textContent =
    `${qty} labels · ${pages} A4 landscape page${pages !== 1 ? 's' : ''} · 12 per page`;

  document.getElementById('btn-print').disabled = false;
  document.getElementById('btn-save').disabled  = false;
  setStatus('');
}

async function saveToSheet() {
  if (!currentData) return;
  if (GAS_URL.includes('YOUR_DEPLOYMENT_ID')) {
    setStatus('⚠️ Paste your GAS Web App URL in the GAS_URL variable.', 'err');
    return;
  }
  setStatus('Saving to Google Sheet…', '');
  document.getElementById('btn-save').disabled = true;
  try {
    const res  = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'saveLabel', data: currentData })
    });
    const json = await res.json();
    setStatus(json.status === 'ok' ? '✅ Saved successfully!' : '❌ ' + (json.message || 'Save failed.'),
              json.status === 'ok' ? 'ok' : 'err');
  } catch (e) {
    setStatus('❌ Network error: ' + e.message, 'err');
  }
  document.getElementById('btn-save').disabled = false;
}

function setStatus(msg, type) {
  const el = document.getElementById('status-msg');
  el.textContent = msg;
  el.className = type || '';
}

window.onload = generate;
</script>
</body>
</html>
